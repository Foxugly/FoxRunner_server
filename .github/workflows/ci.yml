name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      APP_ENV: test
      API_LOG_HTTP_ENABLED: "false"
      APP_LOG_CONSOLE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.lock
      - name: Compile
        run: python -m compileall accounts app catalog cli foxrunner network operations ops scenarios scheduler scripts state tests
      - name: Lint
        run: ruff check .
      - name: Prepare runtime dir
        # Django SQLite test DBs land under .runtime/; Ubuntu CI runners don't ship one.
        shell: bash
        run: mkdir -p .runtime
      - name: CLI engine tests (framework-agnostic)
        # Restrict discovery to tests/ so unittest doesn't pick up the Django app
        # test packages (which need manage.py to bootstrap the test DB).
        # Coverage source is scoped to the CLI engine modules. The Django step
        # below has its own 84 % floor on the Django source. The CLI floor is
        # 75 % because app/redaction.py, app/mail.py, and app/logging_config.py
        # are now Django-side helpers (post-Phase-13 swap from api/) and are
        # only exercised by the Django test run, not the CLI engine tests.
        run: |
          coverage run --source=app,cli,network,operations,scenarios,scheduler,state -m unittest discover -s tests
          coverage report --fail-under=75
      - name: Django migrate + tests
        env:
          DATABASE_URL: sqlite:///.runtime/django-ci.db
          DJANGO_SECRET_KEY: change-me-before-production-32-bytes-minimum-ci
        run: |
          python manage.py migrate
          python manage.py makemigrations --check --dry-run
          python manage.py test catalog ops accounts foxrunner --parallel=1
      - name: Django coverage
        env:
          DATABASE_URL: sqlite:///.runtime/django-coverage.db
          DJANGO_SECRET_KEY: change-me-before-production-32-bytes-minimum-ci
        run: |
          coverage run --source=accounts,catalog,ops,foxrunner manage.py test catalog ops accounts foxrunner --parallel=1
          coverage report --fail-under=84
      - name: Export OpenAPI
        env:
          DATABASE_URL: sqlite:///.runtime/openapi-export.db
          DJANGO_SECRET_KEY: change-me-before-production-32-bytes-minimum-ci
        run: python scripts/export_openapi.py
      - name: Check OpenAPI
        env:
          DATABASE_URL: sqlite:///.runtime/openapi-check.db
          DJANGO_SECRET_KEY: change-me-before-production-32-bytes-minimum-ci
        run: python scripts/check_openapi.py
      - name: Check docs
        run: python scripts/check_docs.py
      - name: Check .env.example
        run: python scripts/check_env_example.py
      - name: Pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Docker Compose config
        if: matrix.os == 'ubuntu-latest'
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          DJANGO_SECRET_KEY: change-me-before-production-32-bytes-minimum-ci
        run: docker compose config
      - name: Docker build
        if: matrix.os == 'ubuntu-latest'
        run: docker build .
