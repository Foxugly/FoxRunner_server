name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      APP_ENV: test
      API_LOG_HTTP_ENABLED: "false"
      APP_LOG_CONSOLE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Compile
        run: python -m compileall api app cli migrations network operations scenarios scheduler scripts state tests
      - name: Lint
        run: ruff check .
      - name: Coverage
        run: |
          coverage run -m unittest
          coverage report --fail-under=84
      - name: Alembic migration cycle
        env:
          AUTH_DATABASE_URL: sqlite+aiosqlite:///.runtime/ci.db
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Export OpenAPI
        run: python scripts/export_openapi.py
      - name: Check OpenAPI
        run: python scripts/check_openapi.py
      - name: Check docs
        run: python scripts/check_docs.py
      - name: Check .env.example
        run: python scripts/check_env_example.py
      - name: Pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
      - name: Docker Compose config
        if: matrix.os == 'ubuntu-latest'
        env:
          POSTGRES_DB: ci
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          AUTH_SECRET: change-me-before-production-32-bytes-minimum-ci
        run: docker compose config
      - name: Docker build
        if: matrix.os == 'ubuntu-latest'
        run: docker build .
