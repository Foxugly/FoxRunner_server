[tool.ruff]
line-length = 180
target-version = "py312"
# Django auto-generates migration files; reformatting them to satisfy ruff
# would diverge from `makemigrations` output and cause repeat fixes every
# time a new model lands. Exclude them from both check and format.
extend-exclude = ["**/migrations"]

[tool.ruff.lint]
select = ["F", "E4", "E7", "E9", "I", "B", "UP", "SIM"]

[tool.coverage.run]
source = ["accounts", "catalog", "ops", "foxrunner", "app", "cli", "network", "operations", "scenarios", "scheduler", "state"]

[tool.coverage.report]
fail_under = 84
show_missing = true
skip_covered = false
