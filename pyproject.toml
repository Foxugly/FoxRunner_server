[tool.ruff]
line-length = 180
target-version = "py312"

[tool.ruff.lint]
select = ["F", "E4", "E7", "E9", "I"]

[tool.coverage.run]
source = ["api", "app", "cli", "network", "operations", "scenarios", "scheduler", "state"]

[tool.coverage.report]
fail_under = 84
show_missing = true
skip_covered = false
