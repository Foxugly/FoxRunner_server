services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smiley
      POSTGRES_USER: smiley
      POSTGRES_PASSWORD: smiley
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smiley -d smiley"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://smiley:smiley@postgres:5432/smiley
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      API_CORS_ORIGINS: http://localhost:4200
      APP_ENV: docker
      APP_LOG_JSON: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A api.celery_app.celery_app worker --loglevel=INFO
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://smiley:smiley@postgres:5432/smiley
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      APP_ENV: docker
      APP_LOG_JSON: "true"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A api.celery_app.celery_app beat --loglevel=INFO
    environment:
      AUTH_DATABASE_URL: postgresql+asyncpg://smiley:smiley@postgres:5432/smiley
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      APP_ENV: docker
      APP_LOG_JSON: "true"
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

  flower:
    build: .
    command: celery -A api.celery_app.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
